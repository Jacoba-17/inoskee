<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>
<style>
  :root {
    --to-name: "Crush";
    --signed-name: "with love";
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: radial-gradient(ellipse at center, #2a0a10 0%, #12040a 60%, #0a0206 100%);
    font-family: 'Segoe UI', Tahoma, sans-serif;
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stage {
    position: relative;
    width: 100%;
    max-width: 480px;
    padding: 20px;
    text-align: center;
  }

  .envelope-wrap {
    position: relative;
    width: 280px;
    margin: 40px auto 30px;   /* Slightly higher overall */
    cursor: pointer;
  }

  .envelope-box {
    position: relative;
    width: 280px;
    height: 200px;
  }

  .envelope-body {
    position: absolute;
    inset: 0;
    background: linear-gradient(145deg, #c81e3a, #8f1226);
    border-radius: 10px;
    box-shadow: 0 0 40px rgba(220, 30, 60, 0.45), 0 10px 30px rgba(0,0,0,0.5);
    overflow: hidden;
    z-index: 1;
  }

  .flap {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 0;
    border-left: 140px solid transparent;
    border-right: 140px solid transparent;
    border-top: 105px solid #e0304f;
    transform-origin: top center;
    transition: transform 0.85s cubic-bezier(.68,-0.4,.27,1.4);
    z-index: 5;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
  }

  .stage.open .flap {
    transform: rotateX(180deg);
  }

  .seal {
    position: absolute;
    top: 48px;
    left: 50%;
    transform: translateX(-50%);
    width: 44px;
    height: 44px;
    border: 2px dashed rgba(255,255,255,0.6);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffd7de;
    font-size: 1.2rem;
    z-index: 6;
    background: rgba(180,10,40,0.4);
    transition: opacity 0.4s ease;
  }

  .stage.open .seal { opacity: 0; }

  /* Letter - Higher popup & better centering */
  .letter {
    position: absolute;
    left: 15px;
    top: 92px;
    width: 250px;
    background: #fbf3e7;
    border-radius: 6px;
    padding: 0 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    text-align: left;
    font-family: 'Georgia', serif;
    color: #7a1626;
    line-height: 1.6;
    z-index: 4;
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: 
      max-height 1.3s cubic-bezier(0.34, 1.56, 0.64, 1) 0.45s,
      opacity 1.1s ease 0.45s,
      transform 1.3s cubic-bezier(0.34, 1.56, 0.64, 1) 0.45s;
    transform: translateY(45px);
  }

  .stage.open .letter {
    max-height: 520px;
    opacity: 1;
    transform: translateY(-85px);     /* Much higher popup */
    padding: 24px 20px;
  }

  .letter .eyebrow {
    font-size: 0.85rem;
    color: #b23a52;
    margin: 0 0 12px;
    font-style: italic;
    text-align: center;
  }

  .letter p {
    margin: 9px 0;
    font-size: 0.96rem;
  }

  .letter .signoff {
    margin-top: 18px;
    font-style: italic;
    color: #b23a52;
  }

  .hearts-float {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }

  .hearts-float span {
    position: absolute;
    opacity: 0;
    color: #ff5c7a;
    font-size: 1.2rem;
  }

  .stage.open .hearts-float span {
    animation: floatUp 2.8s ease-in forwards;
  }

  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(0.8); }
    25% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-180px) scale(1.15); }
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 20px;
  }

  .btn {
    padding: 12px 28px;
    border-radius: 30px;
    border: 1.5px solid #e0435f;
    background: transparent;
    color: #ffd7de;
    font-family: 'Brush Script MT', cursive, sans-serif;
    font-size: 1.15rem;
    cursor: pointer;
  }

  .btn:hover {
    background: rgba(224, 48, 79, 0.25);
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="envelope-wrap" id="envelope">
    <div class="letter">
      <p class="eyebrow">To: <span id="toName"></span></p>
      <p>Dear <span id="toNameLower"></span>,</p>
      <p>Every time I see you, my heart forgets how to behave.</p>
      <p>I don't need much — just a little more of your time, your laugh, your presence.</p>
      <p>If you ever wonder who's thinking of you, it's me. Always.</p>
      <p class="signoff">— <span id="signed"></span> 💌</p>
    </div>

    <div class="envelope-box">
      <div class="envelope-body">
        <div class="hearts-float">
          <span style="left:20%; bottom:35%;">♥</span>
          <span style="left:50%; bottom:25%; animation-delay:0.4s;">♥</span>
          <span style="left:75%; bottom:40%; animation-delay:0.8s;">♥</span>
        </div>
      </div>
      <div class="flap"></div>
      <div class="seal">♥</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="openBtn">Open ✦</button>
    <button class="btn" id="closeBtn">Close</button>
  </div>
</div>

<script>
  const stage = document.getElementById('stage');
  const envelope = document.getElementById('envelope');
  const openBtn = document.getElementById('openBtn');
  const closeBtn = document.getElementById('closeBtn');

  const rootStyles = getComputedStyle(document.documentElement);
  const toName = rootStyles.getPropertyValue('--to-name').trim().replace(/"/g, '');
  const signedName = rootStyles.getPropertyValue('--signed-name').trim().replace(/"/g, '');

  document.getElementById('toName').textContent = toName;
  document.getElementById('toNameLower').textContent = toName.toLowerCase();
  document.getElementById('signed').textContent = signedName;

  function openEnvelope() { stage.classList.add('open'); }
  function closeEnvelope() { stage.classList.remove('open'); }

  envelope.addEventListener('click', () => {
    stage.classList.contains('open') ? closeEnvelope() : openEnvelope();
  });
  openBtn.addEventListener('click', e => { e.stopPropagation(); openEnvelope(); });
  closeBtn.addEventListener('click', e => { e.stopPropagation(); closeEnvelope(); });
</script>

</body>
</html>
