<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>
<style>
  :root {
    --to-name: "Crush";
    --signed-name: "with love";
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: radial-gradient(circle at center, #2a0a10, #12040a 60%, #0a0206);
    font-family: 'Segoe UI', Tahoma, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 300px;
    text-align: center;
  }

  .envelope {
    position: relative;
    width: 280px;
    height: 200px;
    margin: 0 auto;
    cursor: pointer;
  }

  .envelope-body {
    position: absolute;
    inset: 0;
    background: linear-gradient(145deg, #c81e3a, #9c142f);
    border-radius: 8px 8px 12px 12px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    overflow: hidden;
  }

  /* Flap */
  .flap {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 105px;
    background: linear-gradient(#e0304f, #c81e3a);
    clip-path: polygon(0 0, 50% 65%, 100% 0);
    transition: transform 0.8s cubic-bezier(0.6, -0.3, 0.3, 1.2);
    z-index: 5;
    transform-origin: top center;
  }

  .stage.open .flap {
    transform: rotateX(175deg);
  }

  /* Letter */
  .letter {
    position: absolute;
    top: 65px;
    left: 15px;
    width: 250px;
    background: #fffdf0;
    border: 1px solid #f0d8c0;
    border-radius: 4px;
    padding: 18px 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    color: #5c1e2a;
    font-family: Georgia, serif;
    line-height: 1.6;
    z-index: 4;
    opacity: 0;
    transform: translateY(40px) scale(0.92);
    transition: all 1.1s cubic-bezier(0.25, 0.8, 0.25, 1) 0.4s;
    max-height: 0;
    overflow: hidden;
  }

  .stage.open .letter {
    opacity: 1;
    transform: translateY(-12px) scale(1);
    max-height: 380px;
  }

  .letter p {
    margin: 8px 0;
    font-size: 0.96rem;
  }

  .eyebrow {
    font-size: 0.85rem;
    color: #c53d5e;
    text-align: center;
    margin-bottom: 12px;
  }

  .signoff {
    margin-top: 16px;
    font-style: italic;
    color: #c53d5e;
  }

  /* Hearts */
  .heart {
    position: absolute;
    color: #ff4d6d;
    font-size: 1.4rem;
    opacity: 0;
    z-index: 3;
  }

  .stage.open .heart {
    animation: floatHeart 2.8s ease-in forwards;
  }

  @keyframes floatHeart {
    0% { opacity: 0; transform: translateY(0) scale(0.6); }
    30% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-180px) scale(1.1); }
  }

  .controls {
    margin-top: 35px;
    display: flex;
    gap: 16px;
    justify-content: center;
  }

  .btn {
    padding: 12px 32px;
    border: 2px solid #e0304f;
    background: transparent;
    color: #ffd0d9;
    border-radius: 50px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn:hover {
    background: rgba(224, 48, 79, 0.2);
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="envelope" id="envelope">
    <div class="envelope-body">
      <!-- Floating hearts -->
      <div class="heart" style="left:25%; bottom:30%; animation-delay:0.2s;">♥</div>
      <div class="heart" style="left:55%; bottom:45%; animation-delay:0.6s;">♥</div>
      <div class="heart" style="left:75%; bottom:25%; animation-delay:1s;">♥</div>
    </div>
    <div class="flap"></div>

    <!-- The Letter -->
    <div class="letter">
      <p class="eyebrow">◆ To: <span id="toName"></span> ◆</p>
      <p>Dear <span id="toNameLower"></span>,</p>
      <p>I ❤️ynah Vala Lu a hai</p>
      <p>I tello chuan ser mu pawh a al</p>
      <p>Hmarcha te hi a thak lo re2,</p>
      <p class="signoff">— <span id="signed"></span> 💌</p>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="openBtn">Open ♦</button>
    <button class="btn" id="closeBtn">Close</button>
  </div>
  <p style="margin-top:10px; color:#ff8da6; font-style:italic;">click the envelope or use the buttons</p>
</div>

<script>
  const stage = document.getElementById('stage');
  const envelope = document.getElementById('envelope');
  const openBtn = document.getElementById('openBtn');
  const closeBtn = document.getElementById('closeBtn');

  const rootStyles = getComputedStyle(document.documentElement);
  const toName = rootStyles.getPropertyValue('--to-name').trim().replace(/"/g, '');
  const signedName = rootStyles.getPropertyValue('--signed-name').trim().replace(/"/g, '');

  document.getElementById('toName').textContent = toName;
  document.getElementById('toNameLower').textContent = toName.toLowerCase();
  document.getElementById('signed').textContent = signedName;

  function openEnvelope() { stage.classList.add('open'); }
  function closeEnvelope() { stage.classList.remove('open'); }

  envelope.addEventListener('click', () => {
    stage.classList.contains('open') ? closeEnvelope() : openEnvelope();
  });

  openBtn.addEventListener('click', e => { e.stopPropagation(); openEnvelope(); });
  closeBtn.addEventListener('click', e => { e.stopPropagation(); closeEnvelope(); });
</script>

</body>
</html>
